[workspace]
members = ["xtask"]

[package]
name = "splinefit"
version = "0.4.1"
edition = "2021"
description = "B-spline curve and surface fitting — pure-Rust Dierckx engine with ergonomic API"
authors = ["Gerard Harbers", "Harbers Bik LLC"]
repository = "https://github.com/harbik/splinefit"
documentation = "https://docs.rs/splinefit"
readme = "README.md"
keywords = ["spline", "interpolation", "curve", "smoothing", "fitting"]
categories = ["science", "mathematics", "algorithms"]
license = "MIT OR Apache-2.0"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
spliny = "0.3"
csv = "1.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
plotters = { version = "0.3", optional = true }
wasm-bindgen = { version = "0.2", optional = true }
pyo3 = { version = "0.24", features = ["extension-module"], optional = true }
numpy = { version = "0.24", optional = true }

[features]
default = []
plot = ["dep:plotters"]
wasm = ["dep:wasm-bindgen"]
python = ["dep:pyo3", "dep:numpy"]

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "spline_bench"
harness = false

# README.md is generated from the //! doc-comments in src/lib.rs.
# Install: cargo install cargo-rdme
# Update:  cargo rdme
[package.metadata.cargo-rdme]
